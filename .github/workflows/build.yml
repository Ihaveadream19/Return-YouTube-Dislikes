name: Build Return YouTube Dislikes

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: brew install make xz

      # ───────── THEOS ─────────
      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "PATH=$HOME/theos/bin:$PATH" >> $GITHUB_ENV

      # ───────── SDK ─────────
      - name: Setup SDK
        run: |
          rm -rf $HOME/theos/sdks
          git clone --depth 1 https://github.com/theos/sdks.git $HOME/theos/sdks

      # ───────── YouTubeHeader ─────────
      - name: Setup YouTubeHeader
        run: |
          git clone https://github.com/PoomSmart/YouTubeHeader.git $HOME/theos/include/YouTubeHeader

      # ───────── BUILD ─────────
      - name: Build tweak
        run: |
          make clean
          make package FINALPACKAGE=1

      # ───────── OUTPUT ─────────
      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: Return-YouTube-Dislikes
          path: packages/
