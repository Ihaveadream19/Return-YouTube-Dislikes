name: Build

on:

  push:

    branches: [ main ]

  workflow_dispatch:

jobs:

  build:

    runs-on: macos-latest

    steps:

      - name: Checkout

        uses: actions/checkout@v4

      - name: Setup Theos

        run: |

          git clone --recursive https://github.com/theos/theos.git $HOME/theos

          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Install Dependencies

        run: |

          brew install ldid dpkg make perl

          sudo cpan -T install Data::UUID

      - name: Clone YouTubeHeader

        run: |

          git clone https://github.com/PoomSmart/YouTubeHeader.git $HOME/theos/include/YouTubeHeader

      - name: Fix dm.pl

        run: |

          mkdir -p $HOME/theos/bin

          curl -L https://raw.githubusercontent.com/theos/theos/master/bin/dm.pl \

            -o $HOME/theos/bin/dm.pl

          chmod +x $HOME/theos/bin/dm.pl

      - name: Build

        run: |

          export THEOS=$HOME/theos

          export PATH=$THEOS/bin:$PATH

          make clean package FINALPACKAGE=1

      - name: Upload DEB

        uses: actions/upload-artifact@v4

        with:

          name: package

          path: packages/*.deb

      - name: Upload Dylib

        uses: actions/upload-artifact@v4

        with:

          name: dylib

          path: |

            .theos/obj/debug/*.dylib

            .theos/obj/*.dylib
