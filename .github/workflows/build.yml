name: Build Return YouTube Dislikes

on:

  workflow_dispatch:

  push:

jobs:

  build:

    runs-on: macos-latest

    steps:

      # ─────────────────────────────

      # Checkout

      # ─────────────────────────────

      - name: Checkout

        uses: actions/checkout@v4

      # ─────────────────────────────

      # Tools

      # ─────────────────────────────

      - name: Install tools

        run: brew install make xz ldid

      # ─────────────────────────────

      # Theos

      # ─────────────────────────────

      - name: Setup Theos

        run: |

          git clone --recursive https://github.com/theos/theos.git $HOME/theos

          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

          echo "PATH=$HOME/theos/bin:$PATH" >> $GITHUB_ENV

      # ─────────────────────────────

      # SDK

      # ─────────────────────────────

      - name: Setup SDK

        run: |

          rm -rf $HOME/theos/sdks

          git clone --depth 1 https://github.com/theos/sdks.git $HOME/theos/sdks

      # ─────────────────────────────

      # PSHeader

      # ─────────────────────────────

      - name: Setup PSHeader

        run: |

          git clone https://github.com/Ihaveadream19/PSHeader.git PSHeader

          mkdir -p $THEOS/include/PSHeader

          cp -R PSHeader/* $THEOS/include/PSHeader/

      # ─────────────────────────────

      # YouTubeHeader

      # ─────────────────────────────

      - name: Setup YouTubeHeader

        run: |

          git clone https://github.com/Ihaveadream19/YouTubeHeader.git YouTubeHeader

          mkdir -p $THEOS/include/YouTubeHeader

          cp -R YouTubeHeader/* $THEOS/include/YouTubeHeader/

      # ─────────────────────────────

      # Build tweak

      # ─────────────────────────────

      - name: Build tweak

        run: |

          make clean || true

          make

      # ─────────────────────────────

      # Collect ALL required files

      # ─────────────────────────────

      - name: Collect final files

        run: |

          mkdir -p output

          # dylib

          find .theos -name "*.dylib" -exec cp {} output/ \;

          # plist (Loader)

          cp YouTubeDislikesReturn.plist output/

          # Bundle (SEHR WICHTIG)

          cp -R layout/Library/Application\ Support/RYD.bundle output/

      # ─────────────────────────────

      # Debug (optional)

      # ─────────────────────────────

      - name: Show output

        run: |

          ls -R output

      # ─────────────────────────────

      # Upload

      # ─────────────────────────────

      - name: Upload final files

        uses: actions/upload-artifact@v4

        with:

          name: Return-YouTube-Dislikes

          path: output/
