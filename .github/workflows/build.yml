name: Build

on:

  push:

    branches: [ main ]

  workflow_dispatch:

jobs:

  build:

    runs-on: macos-latest

    steps:

      - name: Checkout

        uses: actions/checkout@v4

      - name: Setup Theos

        run: |

          git clone https://github.com/theos/theos.git $HOME/theos

          export THEOS=$HOME/theos

          git -C $THEOS submodule update --init --recursive

          $THEOS/bin/update-theos

          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: Install Dependencies

        run: |

          brew install ldid dpkg make perl

          sudo cpan -T install Data::UUID

      - name: Fix dm.pl (packaging)

        run: |

          mkdir -p $HOME/theos/bin

          curl -L https://raw.githubusercontent.com/theos/theos/master/bin/dm.pl -o $HOME/theos/bin/dm.pl

          chmod +x $HOME/theos/bin/dm.pl

      - name: Install PSHeader

        run: |

          git clone https://github.com/PoomSmart/PSHeader.git

          mkdir -p $HOME/theos/include/PSHeader

          cp -r PSHeader/*.h $HOME/theos/include/PSHeader/

      - name: Build Package

        run: |

          export THEOS=$HOME/theos

          export PATH=$THEOS/bin:$PATH

          make clean package FINALPACKAGE=1

      - name: Upload .deb

        uses: actions/upload-artifact@v4

        with:

          name: package

          path: packages/*.deb

      - name: Upload .dylib

        uses: actions/upload-artifact@v4

        with:

          name: dylib

          path: .theos/obj/debug/*.dylib
